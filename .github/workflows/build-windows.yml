name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Zip release
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "storefunctions.zip"
        shell: powershell

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: storefunctions-windows
          path: storefunctions.zip
          retention-days: 30
          compression-level: 0  # Don't re-zip, the file is already a zip
